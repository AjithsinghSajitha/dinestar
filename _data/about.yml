story:
  heading: Our Story
  paragraphs:
    - DineStar is a purpose-driven company committed to creating sustainable
      dining and packaging solutions that protect the environment while
      supporting local communities. Founded by a team of dedicated entrepreneurs
      with a strong belief in responsible business practices, DineStar combines
      innovation, research, and ethical sourcing to deliver eco-friendly
      products for local and global markets.
    - We specialize in manufacturing and exporting premium Areca palm leaf
      plates, bowls, trays, cutlery, and food packaging products, crafted from
      naturally fallen areca sheaths sourced from the agricultural regions of
      South India. These products are biodegradable, compostable, chemical-free,
      and a smart alternative to plastic and paper disposables.
    - At DineStar, sustainability goes beyond products. We actively invest in
      rural development, fair employment, advanced production technology, and
      environmentally responsible growth. With strong partnerships across farms,
      factories, and supply networks, we ensure consistent quality and global
      standards in every product we deliver.
