heritage:
  eyebrow: Our Heritage
  heading: Born from the Earth
  paragraphs:
    - "DineStar began with a simple observation: nature already creates the
      perfect container. We harvest naturally fallen leaves from the Areca palm,
      ensuring no trees are ever cut down."
    - Each piece is sterilized and heat-pressed using pure steam. No chemicals,
      no glues, no toxins. Just the raw, textured beauty of the palm leaf,
      preserved for your table.
