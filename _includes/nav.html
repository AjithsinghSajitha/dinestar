<nav class="fixed top-0 w-full z-50 bg-surface/80 glass-nav border-b border-outline-variant/10">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 max-w-7xl mx-auto">
        <a href="{{ '/' | relative_url }}" class="flex items-center gap-3">
            <img alt="DineStar Logo" class="h-20 w-auto object-contain" src="{{ '/assets/images/ds-logo.svg' | relative_url }}">
        </a>
        <div class="hidden md:flex items-center gap-8">
            {% for item in site.nav %}
                {% if item.slug == page.nav_active %}
                    <a class="text-primary font-bold border-b-2 border-primary pb-1 text-sm tracking-wide" href="{{ item.url | relative_url }}">{{ item.title }}</a>
                {% else %}
                    <a class="text-secondary hover:text-primary transition-colors text-sm tracking-wide" href="{{ item.url | relative_url }}">{{ item.title }}</a>
                {% endif %}
            {% endfor %}
        </div>
        <div class="flex items-center gap-4">
            <button class="md:hidden p-2 text-primary">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </div>
</nav>
